# Builds the iOS app on Expo's cloud (EAS) and submits it to TestFlight.
#
# Trigger: run manually from GitHub's "Actions" tab ("Run workflow"), or have
# Claude Code trigger it for you. Once the first run is green we can also add an
# automatic "on every push to main" trigger so updates flow with zero clicks.
#
# Requires one repository secret (Settings -> Secrets and variables -> Actions):
#   EXPO_TOKEN  -> a personal access token from expo.dev (lets this run log in to Expo)
# and an App Store Connect API key stored with EAS (so signing + submission run
# without any interactive Apple login). We wire both up together, once.

name: TestFlight (iOS)

on:
  workflow_dispatch:

# Never run two builds at once; let an in-progress build finish rather than cancel it.
concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build on EAS and submit to TestFlight
        run: eas build --platform ios --profile production --non-interactive --auto-submit
