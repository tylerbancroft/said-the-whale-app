# Builds the iOS app on Expo's cloud (EAS) and submits it to TestFlight.
#
# Trigger it manually from the GitHub "Actions" tab ("Run workflow"), or have
# Claude Code trigger it. The App Store Connect API key (stored in the repo
# secrets below) lets EAS generate the iOS signing certificate itself and
# submit the build to TestFlight without any interactive Apple login.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   EXPO_TOKEN      Expo personal access token (logs in to EAS)
#   ASC_API_KEY     Contents of the App Store Connect API key .p8 file
#   ASC_KEY_ID      The API key's Key ID
#   ASC_ISSUER_ID   The App Store Connect Issuer ID

name: TestFlight (iOS)

on:
  workflow_dispatch:

# Never run two builds at once; let an in-progress build finish rather than cancel it.
concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Write App Store Connect API key to a file
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: printf '%s' "$ASC_API_KEY" > "$RUNNER_TEMP/asc_api_key.p8"

      - name: Add submit credentials to eas.json
        env:
          ASC_KEY_PATH: ${{ runner.temp }}/asc_api_key.p8
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          node -e '
            const fs = require("fs");
            const j = JSON.parse(fs.readFileSync("eas.json", "utf8"));
            j.submit = j.submit || {};
            j.submit.production = j.submit.production || {};
            j.submit.production.ios = {
              ascApiKeyPath: process.env.ASC_KEY_PATH,
              ascApiKeyId: process.env.ASC_KEY_ID,
              ascApiKeyIssuerId: process.env.ASC_ISSUER_ID
            };
            fs.writeFileSync("eas.json", JSON.stringify(j, null, 2));
          '

      - name: Build on EAS and submit to TestFlight
        env:
          EXPO_ASC_API_KEY_PATH: ${{ runner.temp }}/asc_api_key.p8
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: eas build --platform ios --profile production --non-interactive --auto-submit
